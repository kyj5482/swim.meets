name: Process meets & deploy site

# input/ 에 PDF가 추가/변경/삭제되거나, 선수 목록/스크립트/사이트가 바뀌면 실행한다.
on:
  push:
    branches: ["**"]
    paths:
      - "input/**"
      - "swimmers.json"
      - "standards/**"
      - "scripts/**"
      - "docs/**"
      - ".github/workflows/process-meets.yml"
  workflow_dispatch:

permissions:
  contents: write   # 생성된 JSON 커밋
  pages: write      # GitHub Pages 배포
  id-token: write

concurrency:
  group: "process-meets"
  cancel-in-progress: false

jobs:
  # 모든 브랜치에서 실행: 파싱 → 데이터 생성 → 커밋.
  # main 일 때만 방금 만든 docs/ 를 Pages 아티팩트로 업로드한다.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OCR (timeline fallback)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends tesseract-ocr

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Parse meets -> data/*.json (삭제된 대회 정리 포함)
        run: python scripts/process_meet.py

      - name: Build site index & progression
        run: python scripts/build_index.py

      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A data docs/data
          if git diff --cached --quiet; then
            echo "변경 사항 없음"
          else
            git commit -m "chore: 대회 데이터/진척도 갱신 [skip ci]"
            git push
          fi

      # 방금 빌드한 작업 트리의 docs/ 를 그대로 아티팩트로 만든다(항상 최신).
      - name: Setup Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: "docs"

  # main 브랜치에서만 실행되는 배포 전용 job.
  # environment 보호 규칙(main만 허용)은 이 job 에만 적용되므로,
  # 다른 브랜치에서는 job 자체가 스킵되어 거부 오류가 나지 않는다.
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
