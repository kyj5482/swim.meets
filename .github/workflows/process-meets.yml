name: Process meets & deploy site

# input/ 에 PDF가 추가/변경되거나, 선수 목록/스크립트가 바뀌면 실행한다.
on:
  push:
    branches: ["**"]
    paths:
      - "input/**"
      - "swimmers.json"
      - "standards/**"
      - "scripts/**"
      - "docs/**"
      - ".github/workflows/process-meets.yml"
  workflow_dispatch:

permissions:
  contents: write   # 생성된 JSON 커밋
  pages: write
  id-token: write

concurrency:
  group: "process-meets"
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OCR (timeline fallback)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends tesseract-ocr

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Parse meets -> data/*.json
        run: python scripts/process_meet.py

      - name: Build site index & progression
        run: python scripts/build_index.py

      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data docs/data
          if git diff --cached --quiet; then
            echo "변경 사항 없음"
          else
            git commit -m "chore: 대회 데이터/진척도 갱신 [skip ci]"
            git push
          fi

  # main 브랜치일 때만 GitHub Pages 배포
  deploy:
    needs: process
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "docs"
      - id: deployment
        uses: actions/deploy-pages@v4
